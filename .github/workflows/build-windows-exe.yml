name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact_arch }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_arch: win-x64
            runs_on: windows-2022
            python_arch: x64
          - artifact_arch: win-arm64
            runs_on: windows-11-arm
            python_arch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python_arch }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --only-binary=cryptography -e ".[ui,dev]"

      - name: Verify ARM64 cryptography wheel
        if: matrix.artifact_arch == 'win-arm64'
        run: |
          python -c "import cryptography; assert cryptography.__version__ == '46.0.3', cryptography.__version__"

      - name: Download latest 7-Zip runtime
        run: python scripts/download_7zip.py tools/7zip ${{ matrix.python_arch }}

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Build executable
        run: |
          # QFluentWidgets exposes optional acrylic image helpers. backUpHelper
          # does not use those effects, so avoid bundling their large numeric and
          # image-processing stacks.
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onedir `
            --noconsole `
            --name backUpHelper `
            --collect-data qfluentwidgets `
            --exclude-module numpy `
            --exclude-module PIL `
            --exclude-module colorthief `
            --exclude-module scipy `
            --add-data "assets/app-icon.svg;assets" `
            --add-data "assets/alipay.jpg;assets" `
            --add-data "tools/7zip;tools/7zip" `
            desktop.py

      - name: Report bundled size
        run: |
          $size = (Get-ChildItem "dist/backUpHelper" -Recurse -File | Measure-Object Length -Sum).Sum
          "Bundled application size: $([math]::Round($size / 1MB, 1)) MiB"

      - name: Package artifact
        run: |
          $version = python -c "import app_info; print(app_info.__version__)"
          $packageName = "backUpHelper-$version-windows-${{ matrix.artifact_arch }}"
          New-Item -ItemType Directory -Path $packageName | Out-Null
          Copy-Item "dist/backUpHelper/*" "$packageName" -Recurse
          Copy-Item "README.md" "$packageName/README.md"
          Copy-Item "LICENSE" "$packageName/LICENSE"
          $packageSize = (Get-ChildItem "$packageName" -Recurse -File | Measure-Object Length -Sum).Sum
          "Artifact folder size: $([math]::Round($packageSize / 1MB, 1)) MiB"
          "PACKAGE_NAME=$packageName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          # upload-artifact creates the download ZIP itself. Upload the release
          # folder directly so the downloaded archive contains one folder, not a ZIP inside a ZIP.
          path: ${{ env.PACKAGE_NAME }}
          if-no-files-found: error
